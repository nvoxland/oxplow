name: Release

# Tag-triggered release flow. Push a `v<version>` tag (matching
# package.json's version field) and this workflow builds installers on
# all three platforms and publishes them to a GitHub Release via
# electron-builder's built-in GitHub provider. Also runnable manually
# from the Actions tab for dry runs / re-runs.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

env:
  BUN_INSTALL_CACHE_DIR: ${{ github.workspace }}/.ci-cache/bun
  ELECTRON_CACHE: ${{ github.workspace }}/.ci-cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.ci-cache/electron-builder

jobs:
  # Tag-vs-package.json sanity check. Fails fast if someone pushed a
  # v0.0.2 tag while package.json still says 0.0.1 — avoids cutting a
  # release with a version mismatch that electron-builder would bake
  # into the installer filenames and update metadata. The verify step
  # no-ops on workflow_dispatch runs that weren't fired against a
  # tag ref (manual dry runs from a branch), so the job always
  # reports success and doesn't block downstream jobs.
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Verify tag matches package.json version
        if: github.ref_type == 'tag'
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          tag_version="${tag#v}"
          pkg_version=$(node -p "require('./package.json').version")
          echo "tag: $tag (version=$tag_version)"
          echo "package.json version: $pkg_version"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag $tag does not match package.json version $pkg_version"
            exit 1
          fi

  test:
    needs: check-tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: .ci-cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-
      - name: Install Linux build deps for node-pty
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential python3
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Test
        run: bun test

  release:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    # `contents: write` is what electron-builder needs in order to
    # create the draft release and upload assets through the GitHub
    # provider (GH_TOKEN uses GITHUB_TOKEN under the hood).
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v5
        with:
          path: .ci-cache
          key: ${{ runner.os }}-build-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-build-
      - name: Install Linux build deps for node-pty
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential python3
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Build JS bundles
        run: bun run build

      # `--publish always` tells electron-builder to upload artifacts to
      # a GitHub Release. First platform to arrive creates the draft
      # release (name + tag pulled from the pushed tag); subsequent
      # matrix legs attach their artifacts to the same draft. Still
      # unsigned — users will see the "unsigned developer" OS warnings.
      - name: Package + publish
        run: bunx electron-builder --publish always
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
