<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>oxplow</title>
    <link rel="stylesheet" href="./dist/main.css" />
    <style>
      /* ============================================================
         Theme tokens. All renderer components read CSS variables.
         Oxplow is dark-only — values live on :root.
         See .context/theming.md.
         ============================================================ */

      :root {
        --surface-app: #14161a;
        --surface-card: #1c1f24;
        --surface-rail: #181b20;
        --surface-tab-active: #1f2228;
        --surface-tab-inactive: #0e1014;
        --surface-elevated: #232730;
        --surface-overlay: rgba(0, 0, 0, 0.55);

        --border-subtle: #2a2e36;
        --border-strong: #3a3f49;

        --text-primary: #e6e8ec;
        --text-secondary: #9aa1ad;
        --text-muted: #6c727c;

        --accent: #5b8cf5;
        --accent-hover: #7aa2f7;
        --accent-soft-bg: #1f2a44;
        --accent-on-accent: #ffffff;

        --status-running: #5b8cf5;
        --status-waiting: #f59e0b;
        --status-ready: #94a3b8;
        --status-done: #34d399;
        --status-canceled: #6b7280;

        --severity-low: #94a3b8;
        --severity-medium: #f59e0b;
        --severity-high: #fb923c;
        --severity-critical: #fb7185;

        --freshness-fresh: #34d399;
        --freshness-stale: #f59e0b;
        --freshness-very-stale: #fb7185;

        --diff-add-bg: #1f3326;
        --diff-add-fg: #a7f3d0;
        --diff-remove-bg: #3a1f25;
        --diff-remove-fg: #fda4af;

        /* Legacy aliases — original dark hex values for components not yet
           migrated to semantic tokens. */
        --bg: #0e0e0e;
        --bg-1: #1a1815;
        --bg-2: #342921;
        --bg-3: #2a313f;
        --bg-tab-inactive: #3a3a3d;
        --bg-detail: #242424;
        --fg: #e6e6e6;
        --muted: #8d8a85;
        --border: #2f2b26;
        --border-strong: #3c3832;
        /* --accent: redefined as semantic above */
        --priority-urgent: #e06c75;
        --priority-high: #e5a06a;
        --priority-medium: #8d8a85;
        --priority-low: #6b6864;

        --blame-local-fresh: rgba(229, 160, 106, 0.55);
        --blame-local-recent: rgba(229, 160, 106, 0.40);
        --blame-local-stale: rgba(229, 160, 106, 0.28);
        --blame-local-old: rgba(170, 140, 110, 0.18);
        --blame-local-border: #e5a06a;
        --blame-git-fresh: rgba(96, 165, 250, 0.55);
        --blame-git-recent: rgba(96, 165, 250, 0.40);
        --blame-git-stale: rgba(96, 165, 250, 0.28);
        --blame-git-old: rgba(120, 140, 170, 0.14);
        --blame-git-border: #4a9eff;
        --blame-uncommitted: rgba(70, 70, 70, 0.35);

        color-scheme: dark;
      }

      html, body, #root {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Inter, Roboto, sans-serif;
        /* 14px base body for the Metabase-grade density tune-up (phase 7).
         * Captions/metadata still drop to 13px; tabular IDs stay at 12px;
         * code/diff regions use the mono stack via Monaco. See
         * .context/theming.md "Density" note. */
        font-size: 14px;
        font-feature-settings: "cv02", "cv03", "cv04", "cv11";
      }
      /* Tabular numerals — applied to IDs/counters/timestamps that need
       * column-aligned digits. Opt-in via class so prose stays proportional. */
      .oxplow-tabular { font-variant-numeric: tabular-nums; font-size: 12px; }
      * { box-sizing: border-box; }
      @keyframes oxplow-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      /* Indeterminate progress: a slim accent bar slides across the track. */
      @keyframes oxplow-progress-indeterminate {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(300%); }
      }
      /* Thin, unobtrusive scrollbars. */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(255, 255, 255, 0.18);
        background-clip: padding-box;
        border: 2px solid transparent;
      }
      ::-webkit-scrollbar-corner { background: transparent; }
      .oxplow-rail-scroll { scrollbar-width: none; }
      .oxplow-rail-scroll::-webkit-scrollbar { display: none; }
      /* Gutter markers for uncommitted changes in the editor. */
      .oxplow-gutter-added { box-shadow: inset 3px 0 0 0 #16a34a; }
      .oxplow-gutter-modified { box-shadow: inset 3px 0 0 0 var(--accent); }
      .oxplow-gutter-deleted { box-shadow: inset 3px -2px 0 -1px #dc2626; }
      /* Blame margin: kebab hidden until row is hovered. */
      .oxplow-blame-row-kebab { opacity: 0; transition: opacity 80ms ease; }
      .oxplow-blame-row:hover .oxplow-blame-row-kebab,
      .oxplow-blame-row-kebab:focus { opacity: 1; }
      /* Markdown view: link kebab hidden until link or its kebab is hovered. */
      .oxplow-md-link-kebab { opacity: 0; transition: opacity 80ms ease; }
      .oxplow-md-link:hover .oxplow-md-link-kebab,
      .oxplow-md-link-kebab:focus-within { opacity: 1; }
      /* Markdown view: GFM tables. ReactMarkdown + remark-gfm emit
         <table>/<thead>/<tbody>/<tr>/<th>/<td> with no styling otherwise,
         which leaves columns running together visually. */
      .oxplow-md table {
        display: block;
        max-width: 100%;
        overflow-x: auto;
        border-collapse: collapse;
        margin: 12px 0;
        font-size: 13px;
      }
      .oxplow-md thead { background: var(--surface-card, #1f242c); }
      .oxplow-md th, .oxplow-md td {
        border: 1px solid var(--border-subtle, #2a313a);
        padding: 6px 10px;
        vertical-align: top;
        text-align: left;
      }
      .oxplow-md th { font-weight: 600; }
      .oxplow-md tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
