<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>newde</title>
    <link rel="stylesheet" href="./dist/main.css" />
    <style>
      :root {
        --bg: #0e0e0e;           /* editor / main content — neutral, darkest */
        --bg-1: #1a1815;         /* center-tab strip, side panels — faint warm */
        --bg-2: #342921;         /* batch rail — warm amber/sienna, complementary to the cool stream rail */
        --bg-3: #2a313f;         /* stream rail — cool blue-tinted top chrome */
        --bg-tab-inactive: #3a3a3d; /* non-selected batch tabs — neutral light gray */
        --bg-detail: #242424;    /* expanded-detail surfaces — neutral elevation above --bg, no warm tint */
        --fg: #e6e6e6;
        --muted: #8d8a85;        /* warm muted to go with the warm chrome */
        --border: #2f2b26;
        --border-strong: #3c3832;
        --accent: #4a9eff;
        --priority-urgent: #e06c75;   /* same red family used in delete affordances */
        --priority-high: #e5a06a;     /* warm orange — escalates visually over --muted */
        --priority-medium: #8d8a85;   /* alias of --muted; no highlight */
        --priority-low: #6b6864;      /* sits below --muted so Low items recede */
      }
      html, body, #root {
        margin: 0;
        height: 100%;
        background: var(--bg);
        color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
        font-size: 13px;
      }
      * { box-sizing: border-box; }
      @keyframes newde-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
      }
      /* Thin, unobtrusive scrollbars. The Electron default leaves a
         pill-shaped thumb artifact even when content fits, which was
         showing up next to the New Stream / + Batch buttons. */
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.08);
        border-radius: 10px;
        border: 2px solid transparent;
        background-clip: padding-box;
      }
      ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.18); background-clip: padding-box; border: 2px solid transparent; }
      ::-webkit-scrollbar-corner { background: transparent; }
      /* Hide scrollbars entirely on the narrow horizontal rails — they only
         show when many streams/batches are open and we don't want the thumb
         floating next to the trailing "+ New" button. */
      .newde-rail-scroll { scrollbar-width: none; }
      .newde-rail-scroll::-webkit-scrollbar { display: none; }
      /* Gutter markers for uncommitted changes in the editor (computed
         against HEAD). A 3px bar on the line-decorations strip. */
      .newde-gutter-added { box-shadow: inset 3px 0 0 0 #16a34a; }
      .newde-gutter-modified { box-shadow: inset 3px 0 0 0 #4a9eff; }
      .newde-gutter-deleted { box-shadow: inset 3px -2px 0 -1px #dc2626; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./dist/main.js"></script>
  </body>
</html>
